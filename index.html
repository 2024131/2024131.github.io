<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYT TurboWarp Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="matrixRain"></div>
    <div class="particle-canvas" id="particles"></div>
    <div class="scanlines"></div>
    <div class="noise-overlay"></div>
    
    <div class="container terminal-effect">
        <header class="header">
            <div class="logo">
                <span class="logo-icon"><i class="fas fa-bolt"></i></span>
                <h1>LYT <span>TurboWarp</span></h1>
            </div>
            <div class="header-controls">
                <button id="themeToggle" class="btn icon" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="fullscreenBtn" class="btn icon" aria-label="Toggle fullscreen">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </header>
        
        <div class="project-carousel">
            <div class="project-thumb" data-id="96708264">
                <div class="thumb-overlay">
                    <i class="fas fa-play"></i>
                </div>
                <img src="https://uploads.scratch.mit.edu/projects/thumbnails/96708264.png" alt="Paper Minecraft">
            </div>
            <div class="project-thumb" data-id="60917032">
                <div class="thumb-overlay">
                    <i class="fas fa-play"></i>
                </div>
                <img src="https://uploads.scratch.mit.edu/projects/thumbnails/60917032.png" alt="Geometry Dash">
            </div>
        </div>
        
        <main class="main-content">
            <div class="project-controls">
                <div class="input-group">
                    <div class="input-prefix">
                        <i class="fas fa-link"></i>
                    </div>
                    <input type="text" id="projectIdInput" placeholder="Enter Project ID" value="96708264">
                    <button id="loadBtn" class="btn primary btn-quantum">
                        <i class="fas fa-play"></i> <span class="btn-text">Load</span>
                    </button>
                </div>
            </div>
            
            <div class="project-viewer">
                <div class="viewer-container holographic" id="viewerContainer">
                    <div class="loading-state" id="loading">
                        <div class="loader">
                            <div class="loader-circle"></div>
                            <div class="loader-circle"></div>
                            <div class="loader-circle"></div>
                        </div>
                        <h3>Initializing Project</h3>
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <p class="loading-text">Loading assets</p>
                    </div>
                    
                    <iframe id="projectFrame" allowtransparency="true" frameborder="0" scrolling="no" allowfullscreen></iframe>
                    
                    <div class="error-state" id="error">
                        <div class="error-icon">
                            <i class="fas fa-unlink"></i>
                        </div>
                        <h3 class="error-title">Connection Failed</h3>
                        <p class="error-desc">We couldn't load the project. Please try:</p>
                        <div class="btn-group">
                            <button id="retryBtn" class="btn primary btn-quantum">
                                <i class="fas fa-sync-alt"></i> <span>Retry</span>
                            </button>
                            <a href="#" id="turbowarpBtn" class="btn outline btn-quantum" target="_blank">
                                <i class="fas fa-external-link-alt"></i> <span>TurboWarp</span>
                            </a>
                            <a href="#" id="scratchBtn" class="btn outline btn-quantum" target="_blank">
                                <i class="fas fa-codepen"></i> <span>Scratch</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <div class="footer-content">
                <p class="footer-text">© <span id="year"></span> LYT TurboWarp Project</p>
                <div class="footer-links">
                    <a href="#" id="aboutBtn"><i class="fas fa-question-circle"></i> About</a>
                    <a href="#" id="githubBtn"><i class="fab fa-github"></i> GitHub</a>
                </div>
            </div>
        </footer>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
