<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYT GAME | Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1>LYT GAME</h1>
            <p>Exciting New Game Coming Soon!</p>
        </header>

        <!-- Countdown Timer -->
        <div class="clock">
            <p>Launching in</p>
            <div class="countdown">
                <span id="countdown-timer" class="highlight">00:00:00</span>
            </div>
            <div class="extra-countdown">
                <div>
                    <span id="days">00</span>
                    <p>Days</p>
                </div>
                <div>
                    <span id="hours">00</span>
                    <p>Hours</p>
                </div>
                <div>
                    <span id="minutes">00</span>
                    <p>Minutes</p>
                </div>
                <div>
                    <span id="seconds">00</span>
                    <p>Seconds</p>
                </div>
            </div>
        </div>

        <!-- Footer Section -->
        <footer>
            <p>&copy; 2025 LYT GAME</p>
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="mailto:contact@lytgame.com">Contact</a>
        </footer>

        <!-- Theme Toggle Button -->
        <button class="theme-toggle" id="theme-toggle">
            🌙
        </button>
    </div>

    <script src="main.js"></script>
</body>
</html>
