<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Awesome Website</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="main.css">
    </head>
<body>
    <header>
        <nav>
            <div class="logo">LYT</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="turbowarp/index.html">Downloads</a></li>
                </ul>
        </nav>
    </header>

    <main>
        <h1>Welcome to Your Homepage!</h1>
        <p>This is the main content of your website. You can add your projects, blog posts, or anything else here.</p>
        <p>Visit our <a href="turbowarp/index.html">Downloads page</a> to get our latest projects.</p>
    </main>

    <footer>
        <p>&copy; 2024 Your Name/Project. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
    <button id="themeToggle" aria-label="Toggle theme">🌙</button>

    <script>
        // Theme Toggle Functionality (repeated here for main page, assuming commonality with download page)
        const toggleButton = document.getElementById('themeToggle');
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (toggleButton) {
                toggleButton.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }

        // Initialize theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                setTheme(savedTheme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            } else {
                setTheme('light');
            }
            
            if (toggleButton) {
                toggleButton.addEventListener('click', toggleTheme);
            }
        });
    </script>
</body>
</html>
