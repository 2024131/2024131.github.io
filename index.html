<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYT TurboWarp Project</title>
    <meta name="description" content="Enhanced TurboWarp and Scratch project viewer with LYT design">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="particle-canvas" id="particles"></div>
    <div class="scanlines"></div>
    <div class="noise-overlay"></div>
    
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon"><i class="fas fa-bolt"></i></span>
                <h1>LYT <span>TurboWarp</span></h1>
            </div>
            <div class="header-controls">
                <button id="themeToggle" class="btn icon" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="fullscreenBtn" class="btn icon" aria-label="Toggle fullscreen">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </header>
        
        <main class="main-content">
            <div class="project-controls">
                <div class="input-group">
                    <div class="input-prefix">
                        <i class="fas fa-link"></i>
                    </div>
                    <input type="text" id="projectIdInput" placeholder="Enter Project ID" value="96708264">
                    <button id="loadBtn" class="btn primary">
                        <i class="fas fa-play"></i> <span class="btn-text">Load</span>
                    </button>
                </div>
                
                <div class="preset-buttons">
                    <button class="btn outline small preset-btn" data-id="96708264">
                        <i class="fas fa-gamepad"></i> Paper Minecraft
                    </button>
                    <button class="btn outline small preset-btn" data-id="60917032">
                        <i class="fas fa-ghost"></i> Geometry Dash
                    </button>
                    <button class="btn outline small preset-btn" data-id="537157934">
                        <i class="fas fa-car"></i> Racing Game
                    </button>
                </div>
            </div>
            
            <div class="project-viewer">
                <div class="viewer-container" id="viewerContainer">
                    <div class="loading-state" id="loading">
                        <div class="loader">
                            <div class="loader-circle"></div>
                            <div class="loader-circle"></div>
                            <div class="loader-circle"></div>
                        </div>
                        <h3>Initializing Project</h3>
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <p class="loading-text">Loading assets</p>
                    </div>
                    
                    <iframe id="projectFrame" 
                            allowtransparency="true"
                            frameborder="0"
                            scrolling="no"
                            allowfullscreen></iframe>
                    
                    <div class="error-state" id="error">
                        <div class="error-icon">
                            <i class="fas fa-unlink"></i>
                        </div>
                        <h3 class="error-title">Connection Failed</h3>
                        <p class="error-desc">We couldn't load the project. Please try:</p>
                        <div class="btn-group">
                            <button id="retryBtn" class="btn primary">
                                <i class="fas fa-sync-alt"></i> <span>Retry</span>
                            </button>
                            <a href="#" id="turbowarpBtn" class="btn outline" target="_blank">
                                <i class="fas fa-external-link-alt"></i> <span>TurboWarp</span>
                            </a>
                            <a href="#" id="scratchBtn" class="btn outline" target="_blank">
                                <i class="fas fa-codepen"></i> <span>Scratch</span>
                            </a>
                        </div>
                    </div>
                </div>
                
                <div class="project-info">
                    <div class="info-card">
                        <h3><i class="fas fa-chart-bar"></i> Performance</h3>
                        <div class="info-content">
                            <div class="info-item">
                                <span>Status:</span>
                                <span id="projectStatus" class="status-badge loading">Loading</span>
                            </div>
                            <div class="info-item">
                                <span>FPS:</span>
                                <span id="projectFPS">-</span>
                            </div>
                            <div class="info-item">
                                <span>Load Time:</span>
                                <span id="projectLoadTime">-</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="info-card">
                        <h3><i class="fas fa-info-circle"></i> Project Info</h3>
                        <div class="info-content">
                            <div class="info-item">
                                <span>ID:</span>
                                <span id="projectIdDisplay" class="mono">-</span>
                            </div>
                            <div class="info-item">
                                <span>Source:</span>
                                <span id="projectSource">-</span>
                            </div>
                            <div class="info-item">
                                <span>Last Loaded:</span>
                                <span id="projectTimestamp">-</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="quick-actions">
                        <button id="screenshotBtn" class="btn outline small">
                            <i class="fas fa-camera"></i> Screenshot
                        </button>
                        <button id="reloadBtn" class="btn outline small">
                            <i class="fas fa-redo"></i> Reload
                        </button>
                        <button id="settingsBtn" class="btn outline small">
                            <i class="fas fa-cog"></i> Settings
                        </button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <div class="footer-content">
                <p class="footer-text">© <span id="year"></span> LYT TurboWarp Project</p>
                <div class="footer-links">
                    <a href="#" id="aboutBtn"><i class="fas fa-question-circle"></i> About</a>
                    <a href="#" id="keyboardBtn"><i class="fas fa-keyboard"></i> Shortcuts</a>
                    <a href="#" id="githubBtn"><i class="fab fa-github"></i> GitHub</a>
                </div>
            </div>
            <div class="version-display">
                <span class="version-badge">v1.0.0</span>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
