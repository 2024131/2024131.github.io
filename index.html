<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYT GAME | Coming Soon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">LYT</div>
                <h1 id="main-title">Coming Soon</h1>
                <p class="subtitle">Building something extraordinary</p>
            </div>
            
            <div class="countdown-section">
                <div class="countdown-grid" id="countdown-container">
                    <div class="countdown-item">
                        <div class="countdown-number" id="days">00</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <span class="countdown-separator">:</span>
                    <div class="countdown-item">
                        <div class="countdown-number" id="hours">00</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <span class="countdown-separator">:</span>
                    <div class="countdown-item">
                        <div class="countdown-number" id="minutes">00</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <span class="countdown-separator">:</span>
                    <div class="countdown-item">
                        <div class="countdown-number" id="seconds">00</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>
            </div>
            
            <div class="cta-section">
                <a href="#" id="emailLink" class="cta-button">
                    <span class="icon">✉️</span> Contact Me
                </a>
            </div>
        </div>
        
        <button id="themeToggle" aria-label="Toggle theme">
            <span class="theme-icon">🌙</span>
        </button>
    </div>

    <script src="main.js"></script>
</body>
</html>
