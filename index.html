<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYT GAME | Coming Soon</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blur"></div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <div class="logo-inner">LYT</div>
                    <div class="logo-pulse"></div>
                </div>
                <h1 id="main-title">Coming Soon</h1>
                <p class="subtitle" id="main-subtitle">Building something extraordinary</p>
            </div>
            
            <div class="countdown-section">
                <div class="countdown-grid" id="countdown-container">
                    <div class="countdown-item">
                        <div class="countdown-number" id="days">00</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="hours">00</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="minutes">00</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="seconds">00</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <div class="cta-section">
                <p>Want early access or have questions?</p>
                <a href="mailto:s2024131@mykwanghua.edu.my" class="cta-button">
                    <i class="fas fa-paper-plane"></i> Contact Me
                </a>
            </div>
        </div>
        
        <div class="footer">
            <a href="https://github.com/2024131" target="_blank" class="social-link" title="Visit my GitHub">
                <i class="fab fa-github"></i> GitHub
            </a>
            <button id="themeToggle" aria-label="Toggle theme">
                <i class="fas fa-sun"></i>
            </button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
