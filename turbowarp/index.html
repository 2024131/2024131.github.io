<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download | LYT Project</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Center the entire page content */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Card styling */
        .download-card {
            width: 100%;
            max-width: 600px;
            padding: 2.5rem;
            text-align: center;
            border-radius: 20px;
            background: var(--card-bg);
            box-shadow: 0 10px 30px var(--shadow);
            margin: 20px 0;
        }

        /* Download button */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            margin: 1.5rem 0;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        .download-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        /* Alternative link */
        .direct-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .direct-link a {
            color: var(--primary);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .direct-link a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Theme toggle button */
        #themeToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px var(--shadow);
            z-index: 100;
            transition: transform 0.3s;
        }

        #themeToggle:hover {
            transform: scale(1.1);
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .download-card {
                padding: 1.8rem;
                border-radius: 16px;
            }
            
            .download-btn {
                padding: 0.9rem 1.8rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .download-card {
                padding: 1.5rem;
                border-radius: 14px;
            }
            
            #themeToggle {
                width: 45px;
                height: 45px;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="download-card">
        <div class="logo">LYT</div>
        <h1>Download Ready</h1>
        <p>Your project file is now available</p>
        
        <a href="https://drive.google.com/uc?export=download&id=1v0flUz9yYUevio1xke6Mb1nFx6CMeIwf" 
           class="download-btn">
           ↓ Download Now
        </a>
        
        <p class="direct-link">
            Can't download? <a href="https://drive.google.com/file/d/1v0flUz9yYUevio1xke6Mb1nFx6CMeIwf/view" target="_blank">Open in Google Drive</a>
        </p>
    </div>

    <button id="themeToggle" aria-label="Toggle theme">🌙</button>

    <script>
        // Theme Toggle Functionality
        const toggleButton = document.getElementById('themeToggle');
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            toggleButton.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }

        // Initialize
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
        toggleButton.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
