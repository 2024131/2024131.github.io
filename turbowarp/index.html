<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download | LYT Project</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .download-container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            margin: 1.5rem 0;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }
        .download-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }
        .direct-link {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .direct-link a {
            color: var(--primary);
            text-decoration: none;
        }
        .direct-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card download-container">
            <div class="logo">LYT</div>
            <h1>Download Ready</h1>
            <p>Your project file is now available</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1v0flUz9yYUevio1xke6Mb1nFx6CMeIwf" 
               class="download-btn">
               ↓ Download Now
            </a>
            
            <p class="direct-link">
                Can't download? <a href="https://drive.google.com/file/d/1v0flUz9yYUevio1xke6Mb1nFx6CMeIwf/view" target="_blank">Open in Google Drive</a>
            </p>
        </div>
        <button id="themeToggle" aria-label="Toggle theme">🌙</button>
    </div>

    <script>
        // Theme Toggle
        const toggle = document.getElementById('themeToggle');
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        };

        toggle.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            setTheme(theme === 'dark' ? 'light' : 'dark');
        });

        // Initialize theme
        setTheme(localStorage.getItem('theme') || 'light');
    </script>
</body>
</html>
